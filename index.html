<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <script src="app.js"></script>

    <title>Frontend Mentor | Product list with cart</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <link href="styles.css" rel="stylesheet" />
  </head>
  <body>
    <main class="product-list-with-cart">
      <div class="product-list-container">
        <header class="product-list-title"><h1>Desserts</h1></header>
        <section class="product-grid"></section>
      </div>

      <section class="cart">
        <header>
          <h2>Your Cart (<!-- Quantity -->0)</h2>
        </header>
        <div class="cart-empty">
          <img
            src="/assets/images/illustration-empty-cart.svg"
            alt="A cake with a a single slice being remove. Representing empty cart."
          />
          <p>Your added items will appear here</p>
        </div>

        <div class="cart-list">
          <!-- Cart Item -->
        </div>

        <div class="cart-list-confirm">
          <button type="button" class="cart-confirm-order">
            Confirm Order
          </button>
        </div>
      </section>

      <!-- Modal -->
      <dialog id="modal-confirm-order"></dialog>
      <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSd4c9qTB1bZ6iOBF3v20Uosv591WGc16d07asuk1JssAxL81Q/viewform?embedded=true" width="640" height="2233" frameborder="0" marginheight="0" marginwidth="0">Cargando…</iframe>
    </main>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">ggandream</a>.
    </footer>
  </body>
</html>
